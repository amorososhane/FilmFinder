<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmFinder</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #6366f1; --bg: #0b0b0b; --card: #171717; --text: #f0e4cc; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100%; overflow: hidden; }
        .sm { height: 100vh; position: relative; display: flex; flex-direction: column; }
        .sc { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity .35s; visibility: hidden; }
        .sc.on { opacity: 1; pointer-events: all; visibility: visible; }
        .wordmark { font-family: 'Playfair Display', serif; font-size: 52px; line-height: 1; color: #fff; text-align: center; }
        .wordmark em { font-style: italic; color: var(--accent); }
        .tagline { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 30px; }
        .btn-g { background: var(--accent); color: #fff; border: none; padding: 14px 32px; font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; border-radius: 8px; width: 100%; max-width: 240px; }
        .btn-gh { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; max-width: 240px; }
        .inp { background: #141414; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 6px; width: 100%; max-width: 240px; outline: none; margin-bottom: 10px; }
        .ta { background: #141414; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 6px; width: 100%; max-width: 240px; height: 120px; resize: none; }
        .carea { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .mc { background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 40px 20px; border-radius: 20px; width: 280px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .ct { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 10px; }
        .swbtns { display: flex; gap: 20px; padding-bottom: 40px; }
        .swb { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; transition: transform 0.1s; }
        .swb:active { transform: scale(0.9); }
        .swyes { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid #22c55e; }
        .swno { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
    </style>
</head>
<body>

<div class="sm" id="smapp">
    <div id="intro-sc" class="sc on">
        <div class="wordmark">Film<em>Finder</em></div>
        <div class="tagline">sync your movie night</div>
        <button class="btn-g" onclick="show('setup-sc')">Create Room</button>
        <div style="margin: 15px 0; color: rgba(255,255,255,0.2); font-size: 10px;">OR</div>
        <input type="text" id="joinID" class="inp" placeholder="Enter 4-digit Code">
        <button class="btn-gh" onclick="joinRoom()">Join Partner</button>
    </div>

    <div id="setup-sc" class="sc">
        <input type="text" id="myName" class="inp" placeholder="Your Name">
        <textarea id="mtxt" class="ta" placeholder="Paste movie list here... (one per line)"></textarea>
        <p style="font-size: 10px; color: gray;">Tip: You only need to do this on one phone.</p>
        <button class="btn-g" onclick="createRoom()">Start Room</button>
    </div>

    <div id="sw-sc" class="sc">
        <div id="roomCodeDisplay
