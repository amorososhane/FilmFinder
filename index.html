<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmFinder</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #ff85a2; --bg: #1a1a1a; --card: #262626; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100%; width: 100%; overflow: hidden; }
        .sm { height: 100vh; width: 100vw; position: relative; }
        .sc { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; opacity: 0; visibility: hidden; transition: opacity .3s ease; }
        .sc.on { opacity: 1; visibility: visible; pointer-events: auto; z-index: 10; }
        .wordmark { font-family: 'Playfair Display', serif; font-size: 52px; line-height: 1; color: var(--accent); text-align: center; margin-bottom: 8px; }
        .wordmark em { font-style: italic; color: #fff; }
        .tagline { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 40px; }
        .btn-g { background: var(--accent); color: #000; border: none; padding: 18px 32px; font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; border-radius: 50px; width: 100%; max-width: 260px; }
        .btn-gh { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 16px; border-radius: 50px; cursor: pointer; width: 100%; max-width: 260px; margin-top: 12px; }
        .inp { background: #333; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 14px; border-radius: 12px; width: 100%; max-width: 260px; outline: none; margin-bottom: 12px; font-size: 16px; }
        .ta { background: #333; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 14px; border-radius: 12px; width: 100%; max-width: 260px; height: 120px; resize: none; font-size: 14px; line-height: 1.6; font-family: inherit; }
        .csv-box { border: 2px dashed rgba(255, 133, 162, 0.3); padding: 15px; border-radius: 12px; width: 100%; max-width: 260px; text-align: center; color: var(--accent); font-size: 12px; cursor: pointer; margin-bottom: 10px; }
        .mc { background: var(--card); border: 1px solid rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 24px; width: 300px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); min-height: 400px; display: flex; flex-direction: column; }
        .poster-box { width: 100%; height: 280px; background: #111; border-radius: 12px; margin-bottom: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .poster-box img { width: 100%; height: 100%; object-fit: cover; }
        .ct { font-family: 'Playfair Display', serif; font-size: 24px; color: #fff; line-height: 1.2; word-wrap: break-word; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .swbtns { display: flex; gap: 30px; margin-top: 30px; }
        .swb { width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .swyes { background: var(--accent); color: #000; }
        .swno { background: #444; color: #fff; }

        /* Bumble Conclusion Style Overlay */
        #match-popup {
            position: fixed; inset: 0; background: #1a1a1ae6; z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        .match-title { font-family: 'Playfair Display', serif; font-size: 44px; color: var(--accent); margin-bottom: 10px; }
        .match-poster-final { width: 220px; height: 320px; border-radius: 16px; overflow: hidden; border: 3px solid var(--accent); box-shadow: 0 0 40px var(--accent); margin: 20px 0; }
        .match-poster-final img { width: 100%; height: 100%; object-fit: cover; }
        .found-txt { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.6); }
    </style>
</head>
<body>
<div class="sm">
    <div id="intro-sc" class="sc on">
        <div class="wordmark">Film<em>Finder</em></div>
        <div class="tagline">Kelly and John</div>
        <button class="btn-g" onclick="showScreen('setup-sc')">Create Room</button>
        <div style="margin: 20px 0; color: rgba(255,255,255,0.1); font-size: 10px; letter-spacing: 3px;">OR</div>
        <input type="text" id="joinID" class="inp" placeholder="Room Code">
        <button class="btn-gh" onclick="joinRoom()">Join Partner</button>
    </div>

    <div id="setup-sc" class="sc">
        <div class="wordmark" style="font-size: 24px; margin-bottom: 20px;">Movies</div>
        <div class="csv-box" onclick="document.getElementById('csv-file').click()">+ Import Watchlist (CSV)</div>
        <input type="file" id="csv-file" style="display:none" accept=".csv" onchange="handleCSV(this)">
        <textarea id="mtxt" class="ta" placeholder="Titles will appear here..."></textarea>
        <button class="btn-gh" style="margin-bottom:10px;" onclick="shuffleList()">🔀 Shuffle Order</button>
        <button class="btn-g" onclick="createRoom()">Start Swiping</button>
    </div>

    <div id="sw-sc" class="sc">
        <div id="roomDisp" style="position:absolute; top:40px; font-size:10px; color:var(--accent); letter-spacing: 2px;"></div>
        <div class="mc" id="card">
            <div class="poster-box" id="pbox">🎬</div>
            <div id="ctit" class="ct">Loading...</div>
        </div>
        <div class="swbtns">
            <button class="swb swno" onclick="vote('no')">✕</button>
            <button class="swb swyes" onclick="vote('yes')">♥</button>
        </div>
    </div>

    <div id="match-popup">
        <div class="found-txt">You matched on</div>
        <div class="match-poster-final" id="m-post-fin"></div>
        <div id="m-name-fin" class="match-title" style="font-size: 32px; margin-bottom: 30px;">Movie Title</div>
        <button class="btn-g" onclick="location.reload()">Start New Session</button>
    </div>
</div>

<script>
    const SB_URL = "https://sndrnxxmdjryqfnjzwsf.supabase.co";
    const SB_KEY = "sb_publishable_9DLNcW9p2Nx3uniVWlnQ-w_9Zqz5a7O";
    const OMDB_KEY = "2399d7cb"; 

    let sb; let state = { rid: null, user: null, movies: [], idx: 0, mySwipes: {}, isMatched: false };
    window.onload = () => { if (typeof supabase !== 'undefined') sb = supabase.createClient(SB_URL, SB_KEY); };
    function showScreen(id) { document.querySelectorAll('.sc').forEach(s => s.classList.remove('on')); document.getElementById(id).classList.add('on'); }

    function handleCSV(input) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const rawLines = e.target.result.split(/\r?\n/).map(l => l.trim()).filter(l => l !== "");
            let headerIdx = rawLines.findIndex(line => line.toLowerCase().includes("name"));
            if (headerIdx === -1) return;
            const headers = rawLines[headerIdx].split(',');
            const nameIdx = headers.findIndex(h => h.trim().toLowerCase() === "name");
            const titles = rawLines.slice(headerIdx + 1).map(line => {
                const cells = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return (cells[nameIdx] || "").replace(/^"|"$/g, '').trim();
            }).filter(t => t.length > 0);
            document.getElementById('mtxt').value = titles.join('\n');
        };
        reader.readAsText(input.files[0]);
    }

    function shuffleList() {
        let titles = document.getElementById('mtxt').value.split('\n').filter(t => t.trim() !== "");
        for (let i = titles.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [titles[i], titles[j]] = [titles[j], titles[i]];
        }
        document.getElementById('mtxt').value = titles.join('\n');
    }

    async function createRoom() {
        const mvList = document.getElementById('mtxt').value.split('\n').map(t => t.trim()).filter(t => t !== "");
        const rid = Math.random().toString(36).substring(2, 6).toUpperCase();
        const { error } = await sb.from('rooms').insert([{ id: rid, movies: mvList, swipes_1: {}, swipes_2: {} }]);
        if (!error) { state = { ...state, rid, user: 1, movies: mvList }; startSession(); }
    }

    async function joinRoom() {
        const rid = document.getElementById('joinID').value.toUpperCase();
        const { data } = await sb.from('rooms').select('*').eq('id', rid).single();
        if (data) { state = { ...state, rid, user: 2, movies: data.movies }; startSession(); }
    }

    function startSession() {
        showScreen('sw-sc');
        document.getElementById('roomDisp').innerText = "ROOM: " + state.rid;
        renderCard();
        sb.channel('live').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${state.rid}` }, p => {
            checkAndLockMatch(p.new);
        }).subscribe();
    }

    async function renderCard() {
        if (state.idx >= state.movies.length || state.isMatched) return;
        const title = state.movies[state.idx];
        document.getElementById('ctit').innerText = title;
        const pbox = document.getElementById('pbox');
        pbox.innerHTML = "⏳";
        try {
            const res = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${OMDB_KEY}`);
            const data = await res.json();
            pbox.innerHTML = (data.Poster && data.Poster !== "N/A") ? `<img src="${data.Poster}">` : "🎬";
        } catch { pbox.innerHTML = "🎬"; }
    }

    async function vote(v) {
        if (state.isMatched) return;
        state.mySwipes[state.idx] = v;
        const col = state.user === 1 ? 'swipes_1' : 'swipes_2';
        await sb.from('rooms').update({ [col]: state.mySwipes }).eq('id', state.rid);
        state.idx++; renderCard();
    }

    function checkAndLockMatch(db) {
        if (state.isMatched) return;
        const s1 = db.swipes_1 || {}, s2 = db.swipes_2 || {};
        state.movies.forEach((movie, i) => {
            if (s1[i] === 'yes' && s2[i] === 'yes') {
                state.isMatched = true; // Lock the UI
                showMatchScreen(movie);
            }
        });
    }

    async function showMatchScreen(title) {
        document.getElementById('m-name-fin').innerText = title;
        const mPost = document.getElementById('m-post-fin');
        document.getElementById('match-popup').style.display = 'flex';
        
        const res = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${OMDB_KEY}`);
        const data = await res.json();
        mPost.innerHTML = (data.Poster && data.Poster !== "N/A") ? `<img src="${data.Poster}">` : "🎬";
    }
</script>
</body>
</html>
