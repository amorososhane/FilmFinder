<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmFinder</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #ff85a2; --bg: #1a1a1a; --card: #262626; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100%; width: 100%; overflow: hidden; }
        .sm { height: 100vh; width: 100vw; position: relative; }
        .sc { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; opacity: 0; visibility: hidden; transition: opacity .4s ease; }
        .sc.on { opacity: 1; visibility: visible; pointer-events: auto; z-index: 10; }
        
        /* Cuter Intro */
        .wordmark { font-family: 'Playfair Display', serif; font-size: 52px; line-height: 1; color: var(--accent); text-align: center; margin-bottom: 8px; }
        .wordmark em { font-style: italic; color: #fff; }
        .status-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #00ff88; }
        .partner-status { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.5); margin-bottom: 20px; }

        .btn-g { background: var(--accent); color: #000; border: none; padding: 18px 32px; font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; border-radius: 50px; width: 100%; max-width: 260px; box-shadow: 0 10px 20px rgba(255, 133, 162, 0.2); }
        .btn-gh { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 16px; border-radius: 50px; cursor: pointer; width: 100%; max-width: 260px; margin-top: 12px; }
        
        .mc { background: var(--card); border: 1px solid rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 30px; width: 310px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); min-height: 440px; display: flex; flex-direction: column; transition: transform 0.3s ease; }
        .poster-box { width: 100%; height: 300px; background: #111; border-radius: 20px; margin-bottom: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        .poster-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Match UI */
        #match-popup {
            position: fixed; inset: 0; background: #111; z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            animation: matchFringe 0.5s ease-out;
        }
        @keyframes matchFringe { from { opacity: 0; filter: blur(20px); } to { opacity: 1; filter: blur(0); } }
        .match-card { width: 250px; height: 360px; border-radius: 20px; border: 4px solid var(--accent); box-shadow: 0 0 50px var(--accent); margin-bottom: 30px; overflow: hidden; }
    </style>
</head>
<body>
<div class="sm">
    <div id="intro-sc" class="sc on">
        <div class="wordmark">Film<em>Finder</em></div>
        <div class="tagline">Kelly and John</div>
        <button class="btn-g" onclick="showScreen('setup-sc')">Create Room</button>
        <div style="margin: 20px 0; color: rgba(255,255,255,0.1); font-size: 10px; letter-spacing: 3px;">OR</div>
        <input type="text" id="joinID" class="inp" placeholder="Room Code">
        <button class="btn-gh" onclick="joinRoom()">Join Partner</button>
    </div>

    <div id="setup-sc" class="sc">
        <textarea id="mtxt" class="ta" placeholder="Paste movie titles..."></textarea>
        <button class="btn-g" style="margin-top:20px" onclick="createRoom()">Start Date Night</button>
    </div>

    <div id="sw-sc" class="sc">
        <div class="partner-status" id="p-stat"><span class="status-dot"></span> Waiting for partner...</div>
        <div class="mc" id="main-card">
            <div class="poster-box" id="pbox">🎬</div>
            <div id="ctit" class="ct" style="font-family: 'Playfair Display', serif; font-size: 24px; padding: 10px;">Loading...</div>
        </div>
        <div class="swbtns">
            <button class="swb swno" onclick="vote('no')">✕</button>
            <button class="swb swyes" onclick="vote('yes')">♥</button>
        </div>
    </div>

    <div id="match-popup">
        <div style="color:var(--accent); font-size: 12px; letter-spacing: 4px; margin-bottom: 10px;">IT'S A MATCH!</div>
        <div class="match-card" id="match-img"></div>
        <div id="match-name" style="font-family: 'Playfair Display'; font-size: 32px; margin-bottom: 40px; color: white;"></div>
        <button class="btn-g" onclick="location.reload()">New Session</button>
    </div>
</div>

<script>
    const SB_URL = "https://sndrnxxmdjryqfnjzwsf.supabase.co";
    const SB_KEY = "sb_publishable_9DLNcW9p2Nx3uniVWlnQ-w_9Zqz5a7O";
    const OMDB_KEY = "2399d7cb"; 

    let sb; let state = { rid: null, user: null, movies: [], idx: 0, mySwipes: {}, preFetched: {} };
    window.onload = () => { if (typeof supabase !== 'undefined') sb = supabase.createClient(SB_URL, SB_KEY); };
    
    function showScreen(id) { document.querySelectorAll('.sc').forEach(s => s.classList.remove('on')); document.getElementById(id).classList.add('on'); }

    async function createRoom() {
        const mvList = document.getElementById('mtxt').value.split('\n').filter(t => t.trim() !== "");
        const rid = Math.random().toString(36).substring(2, 6).toUpperCase();
        await sb.from('rooms').insert([{ id: rid, movies: mvList, swipes_1: {}, swipes_2: {} }]);
        state = { ...state, rid, user: 1, movies: mvList };
        startSession();
    }

    async function joinRoom() {
        const rid = document.getElementById('joinID').value.toUpperCase();
        const { data } = await sb.from('rooms').select('*').eq('id', rid).single();
        if (data) { state = { ...state, rid, user: 2, movies: data.movies }; startSession(); }
    }

    function startSession() {
        showScreen('sw-sc');
        renderCard();
        // Prefetch next 3 movies
        for(let i=1; i<=3; i++) preFetch(i);

        sb.channel('live').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${state.rid}` }, p => {
            updateStatus(p.new);
            checkMatch(p.new);
        }).subscribe();
    }

    function updateStatus(db) {
        const otherUser = state.user === 1 ? 'swipes_2' : 'swipes_1';
        if (Object.keys(db[otherUser] || {}).length > 0) {
            document.getElementById('p-stat').innerHTML = '<span class="status-dot"></span> Partner is swiping!';
        }
    }

    async function preFetch(offset) {
        const i = state.idx + offset;
        if (i >= state.movies.length || state.preFetched[i]) return;
        const res = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(state.movies[i])}&apikey=${OMDB_KEY}`);
        const data = await res.json();
        state.preFetched[i] = (data.Poster && data.Poster !== "N/A") ? data.Poster : "🎬";
    }

    async function renderCard() {
        const title = state.movies[state.idx];
        document.getElementById('ctit').innerText = title;
        const pbox = document.getElementById('pbox');
        
        // Use prefetched or fetch new
        if (state.preFetched[state.idx]) {
            pbox.innerHTML = state.preFetched[state.idx] === "🎬" ? "🎬" : `<img src="${state.preFetched[state.idx]}">`;
        } else {
            const res = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${OMDB_KEY}`);
            const data = await res.json();
            pbox.innerHTML = (data.Poster && data.Poster !== "N/A") ? `<img src="${data.Poster}">` : "🎬";
        }
        preFetch(3); // Keep the buffer full
    }

    async function vote(v) {
        state.mySwipes[state.idx] = v;
        const col = state.user === 1 ? 'swipes_1' : 'swipes_2';
        await sb.from('rooms').update({ [col]: state.mySwipes }).eq('id', state.rid);
        
        // "Pop" animation
        const card = document.getElementById('main-card');
        card.style.transform = v === 'yes' ? 'translateX(100px) rotate(10deg)' : 'translateX(-100px) rotate(-10deg)';
        card.style.opacity = '0';
        
        setTimeout(() => {
            card.style.transform = 'none';
            card.style.opacity = '1';
            state.idx++;
            renderCard();
        }, 200);
    }

    function checkMatch(db) {
        const s1 = db.swipes_1 || {}, s2 = db.swipes_2 || {};
        state.movies.forEach((movie, i) => {
            if (s1[i] === 'yes' && s2[i] === 'yes') {
                showMatch(movie);
            }
        });
    }

    async function showMatch(title) {
        document.getElementById('match-name').innerText = title;
        const res = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${OMDB_KEY}`);
        const data = await res.json();
        document.getElementById('match-img').innerHTML = `<img src="${data.Poster}" style="width:100%;height:100%;object-fit:cover">`;
        document.getElementById('match-popup').style.display = 'flex';
    }
</script>
</body>
</html>
