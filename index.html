<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmFinder</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #ff85a2; --bg: #1a1a1a; --card: #262626; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            font-family: 'DM Sans', sans-serif; height: 100%; width: 100%; 
            overflow: hidden; 
        }
        
        .sm { 
            height: 100vh; width: 100vw; position: relative; 
            overflow-y: auto; -webkit-overflow-scrolling: touch; 
        }

        .sc { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 24px; 
            opacity: 0; visibility: hidden; transition: opacity .3s ease; 
            overflow-y: auto; 
        }

        #setup-sc {
            justify-content: flex-start;
            height: auto;
            min-height: 100%;
            padding-bottom: 120px; 
        }

        .sc.on { opacity: 1; visibility: visible; pointer-events: auto; z-index: 10; }
        
        .wordmark { font-family: 'Playfair Display', serif; font-size: 52px; line-height: 1; color: var(--accent); text-align: center; margin-bottom: 8px; }
        .wordmark em { font-style: italic; color: #fff; }
        .tagline { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 40px; }
        
        .btn-g { background: var(--accent); color: #000; border: none; padding: 18px 32px; font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; border-radius: 50px; width: 100%; max-width: 260px; box-shadow: 0 10px 20px rgba(255, 133, 162, 0.2); flex-shrink: 0; }
        .btn-gh { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 16px; border-radius: 50px; cursor: pointer; width: 100%; max-width: 260px; margin-top: 12px; flex-shrink: 0; }
        .inp { background: #333; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 14px; border-radius: 12px; width: 100%; max-width: 260px; outline: none; margin-bottom: 12px; font-size: 16px; }
        
        .manual-link { font-size: 11px; color: rgba(255,255,255,0.4); text-decoration: none; letter-spacing: 1px; margin: 15px 0; transition: color 0.3s; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 2px; }
        .manual-link:hover { color: var(--accent); }
        
        .ta-wrap { width: 100%; max-width: 260px; display: none; margin-bottom: 15px; }
        .ta { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); color: #fff; padding: 16px; border-radius: 16px; width: 100%; height: 140px; resize: none; font-size: 13px; line-height: 1.6; font-family: inherit; outline: none; }
        .ta:focus { border-color: rgba(255,133,162,0.4); }

        .csv-box { border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 50px; width: 100%; max-width: 260px; text-align: center; color: rgba(255,255,255,0.6); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; }

        /* Director filter */
        .director-wrap { width: 100%; max-width: 260px; margin-bottom: 14px; position: relative; }
        .director-inp { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #fff; padding: 12px 36px 12px 14px; border-radius: 50px; width: 100%; outline: none; font-size: 13px; font-family: inherit; transition: border-color 0.2s; }
        .director-inp::placeholder { color: rgba(255,255,255,0.25); }
        .director-inp:focus { border-color: rgba(255,133,162,0.4); }
        .director-inp.has-value { border-color: rgba(255,133,162,0.3); }
        .director-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 14px; padding: 4px; display: none; line-height: 1; }
        .director-clear.visible { display: block; }

        /* Card flip */
        .mc { background: var(--card); border: 1px solid rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 24px; width: 300px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); min-height: 400px; display: flex; flex-direction: column; cursor: pointer; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; flex: 1; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); min-height: 360px; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; flex-direction: column; }
        .card-back { transform: rotateY(180deg); justify-content: flex-start; gap: 10px; text-align: left; padding-top: 4px; overflow: hidden; }
        .poster-box { width: 100%; height: 280px; background: #111; border-radius: 12px; margin-bottom: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .poster-box img { width: 100%; height: 100%; object-fit: cover; }
        .ct { font-family: 'Playfair Display', serif; font-size: 24px; color: #fff; line-height: 1.2; word-wrap: break-word; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .back-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent); line-height: 1.2; margin-bottom: 2px; }
        .back-meta { display: flex; gap: 6px; flex-wrap: wrap; }
        .back-tag { background: rgba(255,133,162,0.12); color: var(--accent); font-size: 10px; padding: 3px 8px; border-radius: 20px; letter-spacing: .05em; }
        .back-plot { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.6; flex-grow: 1; overflow: hidden; }
        .back-detail { font-size: 11px; color: rgba(255,255,255,0.4); }
        .back-detail span { color: rgba(255,255,255,0.8); }
        .back-imdb { font-size: 11px; color: rgba(255,255,255,0.4); }
        .back-imdb span { color: #f5c518; font-weight: 700; }

        /* End of deck state */
        .end-card { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; }
        .end-icon { font-size: 40px; margin-bottom: 4px; }
        .end-title { font-family: 'Playfair Display', serif; font-size: 22px; color: #fff; }
        .end-sub { font-size: 12px; color: rgba(255,255,255,0.35); letter-spacing: .05em; text-align: center; line-height: 1.6; }

        .swbtns { display: flex; gap: 30px; margin-top: 30px; }
        .swb { width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .swyes { background: var(--accent); color: #000; }
        .swno { background: #444; color: #fff; }
        .swb:disabled { opacity: 0.2; cursor: not-allowed; }

        .status-header { position: absolute; top: 40px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .pulse-dot { width: 10px; height: 10px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 12px #00ff88; animation: heartbeat 2s infinite; display: none; }
        @keyframes heartbeat { 0% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.6; } }
        .room-tag { font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }

        #match-popup { position: fixed; inset: 0; background: #1a1a1ae6; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(12px); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        .match-title { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--accent); margin-bottom: 30px; }
        .match-poster-final { width: 220px; height: 320px; border-radius: 16px; overflow: hidden; border: 3px solid var(--accent); box-shadow: 0 0 40px rgba(255, 133, 162, 0.4); margin: 20px 0; }
        .match-poster-final img { width: 100%; height: 100%; object-fit: cover; }
        .found-txt { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.6); }

        .or-divider { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 260px; margin: 20px 0; }
        .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06); }
        .or-divider span { font-size: 9px; letter-spacing: .3em; color: rgba(255,255,255,0.15); text-transform: uppercase; }
        .discover-label { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 12px; align-self: flex-start; max-width: 260px; width: 100%; }
        .genre-chips { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; max-width: 260px; margin-bottom: 14px; }
        .chip { background: #2e2e2e; border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); font-size: 12px; padding: 7px 14px; border-radius: 50px; cursor: pointer; transition: all .2s; user-select: none; }
        .chip.active { background: rgba(255,133,162,0.15); border-color: var(--accent); color: var(--accent); }
        .discover-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 16px; border-radius: 50px; cursor: pointer; width: 100%; max-width: 260px; font-size: 12px; font-weight: 500; letter-spacing: .05em; transition: opacity 0.2s; }
        .discover-btn:disabled { opacity: 0.25; cursor: not-allowed; }
        .loading-txt { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: .1em; margin-top: 8px; min-height: 16px; }

        .year-filter { width: 100%; max-width: 260px; margin-bottom: 16px; }
        .year-labels { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .year-labels span { font-size: 11px; color: rgba(255,255,255,0.35); }
        .year-labels strong { font-size: 13px; color: var(--accent); font-weight: 500; }
        .range-wrap { position: relative; height: 28px; display: flex; align-items: center; }
        .range-track { position: absolute; left: 0; right: 0; height: 3px; background: #3a3a3a; border-radius: 2px; }
        .range-fill { position: absolute; height: 3px; background: var(--accent); border-radius: 2px; pointer-events: none; }
        .range-wrap input[type=range] { position: absolute; width: 100%; pointer-events: none; appearance: none; -webkit-appearance: none; background: transparent; height: 3px; }
        .range-wrap input[type=range]::-webkit-slider-thumb { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--accent); border: 3px solid #1a1a1a; cursor: pointer; pointer-events: all; box-shadow: 0 0 0 2px rgba(255,133,162,0.3); }
        .range-wrap input[type=range]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); border: 3px solid #1a1a1a; cursor: pointer; pointer-events: all; }
    </style>
</head>
<body>
<div class="sm">
    <div id="intro-sc" class="sc on">
        <div class="wordmark">Film<em>Finder</em></div>
        <div class="tagline">Kelly & John</div>
        <button class="btn-g" onclick="showScreen('setup-sc')">Create Room</button>
        <div style="margin: 20px 0; color: rgba(255,255,255,0.1); font-size: 10px; letter-spacing: 3px;">OR</div>
        <input type="text" id="joinID" class="inp" placeholder="Room Code">
        <button class="btn-gh" onclick="joinRoom()">Join Partner</button>
    </div>

    <div id="setup-sc" class="sc">
        <div class="wordmark" style="font-size: 24px; margin-bottom: 20px; margin-top: 40px;">Movies</div>

        <div class="discover-label">Discover by genre</div>
        <div class="genre-chips" id="genre-chips"></div>

        <!-- Director filter -->
        <div class="director-wrap">
            <input type="text" id="director-inp" class="director-inp" placeholder="Filter by director..." oninput="onDirectorInput(this)" autocomplete="off">
            <button class="director-clear" id="director-clear" onclick="clearDirector()">✕</button>
        </div>

        <div class="year-filter">
            <div class="year-labels">
                <span>Year range</span>
                <strong id="year-display"></strong>
            </div>
            <div class="range-wrap">
                <div class="range-track"></div>
                <div class="range-fill" id="range-fill"></div>
                <input type="range" id="year-min" min="1920" value="1920" step="1" oninput="updateYearRange()">
                <input type="range" id="year-max" min="1920" value="" step="1" oninput="updateYearRange()">
            </div>
        </div>

        <button class="discover-btn" id="discover-btn" onclick="discoverMovies()" disabled>✦ Generate 30 Movies</button>
        <div class="loading-txt" id="loading-txt"></div>

        <div class="or-divider"><span>custom curation</span></div>

        <div class="csv-box" onclick="document.getElementById('csv-file').click()">Import Letterboxd CSV</div>
        <input type="file" id="csv-file" style="display:none" accept=".csv" onchange="handleCSV(this)">
        
        <div class="manual-link" id="manual-trigger" onclick="toggleTextArea()">+ Add Specific Titles</div>
        
        <div class="ta-wrap" id="ta-wrap">
            <textarea id="mtxt" class="ta" placeholder="Enter movie titles (one per line)..."></textarea>
            <button class="btn-gh" style="font-size: 10px; padding: 10px;" onclick="shuffleList()">🔀 Shuffle Order</button>
        </div>
        
        <button class="btn-g" onclick="createRoom()">Start Swiping</button>
    </div>

    <div id="sw-sc" class="sc">
        <div class="status-header">
            <div id="dot" class="pulse-dot"></div>
            <div id="roomDisp" class="room-tag"></div>
        </div>
        <div class="mc" id="main-card" onclick="handleCardClick()">
            <div class="card-inner" id="card-inner">
                <div class="card-front">
                    <div class="poster-box" id="pbox">🎬</div>
                    <div id="ctit" class="ct">Loading...</div>
                </div>
                <div class="card-back" id="card-back">
                    <div id="back-title" class="back-title"></div>
                    <div id="back-meta" class="back-meta"></div>
                    <p id="back-plot" class="back-plot"></p>
                    <div id="back-director" class="back-detail"></div>
                    <div id="back-rated" class="back-detail"></div>
                    <div id="back-imdb" class="back-imdb"></div>
                </div>
            </div>
        </div>
        <div class="swbtns">
            <button class="swb swno" id="btn-no" onclick="event.stopPropagation(); vote('no')">✕</button>
            <button class="swb swyes" id="btn-yes" onclick="event.stopPropagation(); vote('yes')">♥</button>
        </div>
    </div>

    <div id="match-popup">
        <div class="found-txt">You matched on</div>
        <div class="match-poster-final" id="m-post-fin"></div>
        <div id="m-name-fin" class="match-title">Movie Title</div>
        <button class="btn-g" onclick="location.reload()">New Session</button>
    </div>
</div>

<script>
    const SB_URL = "https://sndrnxxmdjryqfnjzwsf.supabase.co";
    const SB_KEY = "sb_publishable_9DLNcW9p2Nx3uniVWlnQ-w_9Zqz5a7O";
    const OMDB_KEY = "2399d7cb";
    const TMDB_KEY = "385f4fd47ec79314b2ff7ef0a59710f8";
    const CURRENT_YEAR = new Date().getFullYear();

    const TMDB_GENRES = {
        "Action": 28, "Romance": 10749, "Comedy": 35, "Horror": 27,
        "Sci-Fi": 878, "Drama": 18, "Thriller": 53, "Animation": 16,
        "Crime": 80, "Fantasy": 14, "Mystery": 9648, "Adventure": 12,
    };

    let sb;
    let state = { rid: null, user: null, movies: [], idx: 0, mySwipes: {}, isMatched: false, cache: {} };
    const selectedGenres = new Set();

    window.onload = () => {
        if (typeof supabase !== 'undefined') sb = supabase.createClient(SB_URL, SB_KEY);
        const minEl = document.getElementById('year-min');
        const maxEl = document.getElementById('year-max');
        minEl.min = 1920;
        minEl.max = CURRENT_YEAR;
        maxEl.min = 1920;
        maxEl.max = CURRENT_YEAR;
        maxEl.value = CURRENT_YEAR;
        minEl.value = 1920;
        buildChips();
        updateYearRange();
    };

    function toggleTextArea() {
        const wrap = document.getElementById('ta-wrap');
        const trigger = document.getElementById('manual-trigger');
        const isHidden = (wrap.style.display === 'none' || wrap.style.display === '');
        wrap.style.display = isHidden ? 'block' : 'none';
        trigger.innerText = isHidden ? '− Hide Manual List' : '+ Add Specific Titles';
    }

    function buildChips() {
        const container = document.getElementById('genre-chips');
        Object.keys(TMDB_GENRES).forEach(genre => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.textContent = genre;
            chip.onclick = () => toggleChip(chip, genre);
            container.appendChild(chip);
        });
    }

    function toggleChip(el, genre) {
        if (selectedGenres.has(genre)) {
            selectedGenres.delete(genre);
            el.classList.remove('active');
        } else {
            selectedGenres.add(genre);
            el.classList.add('active');
        }
        updateDiscoverBtn();
    }

    function onDirectorInput(el) {
        const val = el.value.trim();
        el.classList.toggle('has-value', val.length > 0);
        document.getElementById('director-clear').classList.toggle('visible', val.length > 0);
        updateDiscoverBtn();
    }

    function clearDirector() {
        const inp = document.getElementById('director-inp');
        inp.value = '';
        inp.classList.remove('has-value');
        document.getElementById('director-clear').classList.remove('visible');
        updateDiscoverBtn();
    }

    function updateDiscoverBtn() {
        const hasGenre = selectedGenres.size > 0;
        const hasDirector = document.getElementById('director-inp').value.trim().length > 0;
        const btn = document.getElementById('discover-btn');
        btn.disabled = !hasGenre && !hasDirector;
        if (hasDirector && !hasGenre) {
            btn.textContent = '✦ Show all Movies';
        } else {
            btn.textContent = '✦ Generate 30 Movies';
        }
    }

    function updateYearRange() {
        const minEl = document.getElementById('year-min');
        const maxEl = document.getElementById('year-max');
        let minVal = parseInt(minEl.value);
        let maxVal = parseInt(maxEl.value);
        if (minVal >= maxVal) {
            if (document.activeElement === minEl) {
                minEl.value = maxVal - 1; minVal = maxVal - 1;
            } else {
                maxEl.value = minVal + 1; maxVal = minVal + 1;
            }
        }
        document.getElementById('year-display').textContent = `${minVal} – ${maxVal}`;
        const total = CURRENT_YEAR - 1920;
        const leftPct = ((minVal - 1920) / total) * 100;
        const rightPct = ((maxVal - 1920) / total) * 100;
        document.getElementById('range-fill').style.left = leftPct + '%';
        document.getElementById('range-fill').style.width = (rightPct - leftPct) + '%';
    }

    async function discoverMovies() {
        const btn = document.getElementById('discover-btn');
        const loadTxt = document.getElementById('loading-txt');
        btn.disabled = true;
        loadTxt.textContent = 'Curating...';

        const yearMin = document.getElementById('year-min').value;
        const yearMax = document.getElementById('year-max').value;
        const directorName = document.getElementById('director-inp').value.trim();
        const TARGET = 30;
        const seen = new Set();
        let titles = [];

        // Director search via TMDB person lookup
        if (directorName) {
            try {
                const personRes = await fetch(`https://api.themoviedb.org/3/search/person?api_key=${TMDB_KEY}&query=${encodeURIComponent(directorName)}`);
                const personData = await personRes.json();
                const director = (personData.results || []).find(p => p.known_for_department === 'Directing') || personData.results?.[0];
                if (director) {
                    const credRes = await fetch(`https://api.themoviedb.org/3/person/${director.id}/movie_credits?api_key=${TMDB_KEY}`);
                    const credData = await credRes.json();
                    // No vote_count floor — include all films the director actually directed
                    const directed = (credData.crew || [])
                        .filter(m => m.job === 'Director' && m.title && m.release_date)
                        .filter(m => {
                            const yr = parseInt((m.release_date || '').slice(0, 4));
                            return yr >= parseInt(yearMin) && yr <= parseInt(yearMax);
                        })
                        // Dedupe by title (TMDB sometimes has duplicate entries)
                        .filter((m, i, arr) => arr.findIndex(x => x.title === m.title) === i)
                        .sort((a, b) => {
                            const ayr = parseInt((a.release_date || '').slice(0, 4));
                            const byr = parseInt((b.release_date || '').slice(0, 4));
                            return ayr - byr;
                        });

                    if (selectedGenres.size > 0) {
                        const genreIds = [...selectedGenres].map(g => TMDB_GENRES[g]);
                        directed.filter(m => (m.genre_ids || []).some(id => genreIds.includes(id)))
                            .forEach(m => { if (!seen.has(m.title)) { seen.add(m.title); titles.push(m.title); } });
                    } else {
                        // No cap for director-only — show their full filmography
                        directed.forEach(m => { if (!seen.has(m.title)) { seen.add(m.title); titles.push(m.title); } });
                    }
                }
            } catch {}
        }

        // Genre-only discovery (no director filter)
        if (selectedGenres.size > 0 && !directorName) {
            const genres = [...selectedGenres];
            const perGenre = Math.ceil(TARGET / genres.length);
            const genreResults = {};
            await Promise.all(genres.map(async genre => {
                const genreId = TMDB_GENRES[genre];
                const genreTitles = [];
                let page = 1;
                while (genreTitles.length < perGenre + 5 && page <= 3) {
                    try {
                        const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_KEY}&with_genres=${genreId}&sort_by=popularity.desc&vote_count.gte=200&primary_release_date.gte=${yearMin}-01-01&primary_release_date.lte=${yearMax}-12-31&page=${page}`);
                        const data = await res.json();
                        if (data.results) {
                            data.results.forEach(m => { if (m.title && !seen.has(m.title)) { seen.add(m.title); genreTitles.push(m.title); } });
                        }
                    } catch {}
                    page++;
                }
                genreResults[genre] = genreTitles.sort(() => Math.random() - 0.5).slice(0, perGenre);
            }));
            genres.forEach(genre => titles.push(...(genreResults[genre] || [])));
        }

        const trimmed = titles.slice(0, TARGET);
        document.getElementById('mtxt').value = trimmed.join('\n');

        if (trimmed.length === 0) {
            loadTxt.textContent = 'No results found — try adjusting filters';
        } else {
            loadTxt.textContent = `✦ ${trimmed.length} titles ready`;
        }
        btn.disabled = false;
        updateDiscoverBtn();
    }

    function showScreen(id) {
        document.querySelectorAll('.sc').forEach(s => s.classList.remove('on'));
        document.getElementById(id).classList.add('on');
        document.querySelector('.sm').scrollTop = 0;
    }

    function handleCSV(input) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const rawLines = e.target.result.split(/\r?\n/).map(l => l.trim()).filter(l => l !== "");
            let headerIdx = rawLines.findIndex(line => line.toLowerCase().includes("name"));
            if (headerIdx === -1) return;
            const headers = rawLines[headerIdx].split(',');
            const nameIdx = headers.findIndex(h => h.trim().toLowerCase() === "name");
            const titles = rawLines.slice(headerIdx + 1).map(line => {
                const cells = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return (cells[nameIdx] || "").replace(/^"|"$/g, '').trim();
            }).filter(t => t.length > 0);
            document.getElementById('mtxt').value = titles.join('\n');
        };
        reader.readAsText(input.files[0]);
    }

    function shuffleList() {
        let titles = document.getElementById('mtxt').value.split('\n').filter(t => t.trim() !== "");
        titles.sort(() => Math.random() - 0.5);
        document.getElementById('mtxt').value = titles.join('\n');
    }

    async function createRoom() {
        const mvList = document.getElementById('mtxt').value.split('\n').map(t => t.trim()).filter(t => t !== "");
        const rid = Math.random().toString(36).substring(2, 6).toUpperCase();
        const { error } = await sb.from('rooms').insert([{ id: rid, movies: mvList, swipes_1: {}, swipes_2: null }]);
        if (!error) { state = { ...state, rid, user: 1, movies: mvList }; startSession(); }
    }

    async function joinRoom() {
        const rid = document.getElementById('joinID').value.toUpperCase();
        const { data } = await sb.from('rooms').select('*').eq('id', rid).single();
        if (data) {
            state = { ...state, rid, user: 2, movies: data.movies };
            await sb.from('rooms').update({ swipes_2: {} }).eq('id', rid);
            startSession();
        }
    }

    function startSession() {
        showScreen('sw-sc');
        document.getElementById('roomDisp').innerText = state.rid;
        renderCard();
        sb.channel('live').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${state.rid}` }, p => {
            updatePresence(p.new);
            checkAndLockMatch(p.new);
        }).subscribe();
    }

    function updatePresence(db) {
        if (db.swipes_2 !== null) document.getElementById('dot').style.display = 'block';
    }

    async function getPoster(title, index) {
        if (state.cache[index]) return state.cache[index];
        try {
            const res = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${OMDB_KEY}`);
            const data = await res.json();
            const url = (data.Poster && data.Poster !== "N/A") ? data.Poster : "🎬";
            state.cache[index] = { url, data };
            return state.cache[index];
        } catch { return { url: "🎬", data: null }; }
    }

    function showEndOfDeck() {
        document.getElementById('card-inner').classList.remove('flipped');
        document.getElementById('card-inner').innerHTML = `
            <div class="card-front">
                <div class="end-card">
                    <div class="end-icon">✦</div>
                    <div class="end-title">That's everything</div>
                    <div class="end-sub">You've seen all ${state.movies.length} films.<br>Waiting for your partner to finish…</div>
                </div>
            </div>`;
        document.getElementById('btn-yes').disabled = true;
        document.getElementById('btn-no').disabled = true;
        document.getElementById('main-card').style.cursor = 'default';
    }

    function handleCardClick() {
        if (state.idx < state.movies.length) {
            document.getElementById('card-inner').classList.toggle('flipped');
        }
    }

    async function renderCard() {
        if (state.isMatched) return;
        if (state.idx >= state.movies.length) {
            showEndOfDeck();
            return;
        }
        const title = state.movies[state.idx];
        document.getElementById('card-inner').classList.remove('flipped');
        document.getElementById('ctit').innerText = title;
        const { url, data } = await getPoster(title, state.idx);
        document.getElementById('pbox').innerHTML = url === "🎬" ? "🎬" : `<img src="${url}">`;
        const d = data || {};
        document.getElementById('back-title').innerText = d.Title || title;
        const tags = [d.Year, d.Runtime, ...(d.Genre ? d.Genre.split(', ') : [])].filter(Boolean);
        document.getElementById('back-meta').innerHTML = tags.map(t => `<span class="back-tag">${t}</span>`).join('');
        document.getElementById('back-plot').innerText = d.Plot && d.Plot !== "N/A" ? d.Plot : "";
        document.getElementById('back-director').innerHTML = d.Director && d.Director !== "N/A" ? `Director <span>${d.Director}</span>` : "";
        document.getElementById('back-rated').innerHTML = d.Rated && d.Rated !== "N/A" ? `Rated <span>${d.Rated}</span>` : "";
        document.getElementById('back-imdb').innerHTML = d.imdbRating && d.imdbRating !== "N/A" ? `IMDb <span>★ ${d.imdbRating}</span>` : "";
    }

    async function vote(v) {
        if (state.isMatched || state.idx >= state.movies.length) return;
        state.mySwipes[state.idx] = v;
        const col = state.user === 1 ? 'swipes_1' : 'swipes_2';
        const card = document.getElementById('main-card');
        card.style.transform = v === 'yes' ? 'translateX(100px) rotate(10deg)' : 'translateX(-100px) rotate(-10deg)';
        card.style.opacity = '0';
        await sb.from('rooms').update({ [col]: state.mySwipes }).eq('id', state.rid);
        const { data } = await sb.from('rooms').select('*').eq('id', state.rid).single();
        checkAndLockMatch(data);
        setTimeout(() => {
            card.style.transform = 'none'; card.style.opacity = '1';
            state.idx++; renderCard();
        }, 200);
    }

    function checkAndLockMatch(db) {
        if (state.isMatched) return;
        const s1 = db.swipes_1 || {}, s2 = db.swipes_2 || {};
        state.movies.forEach((movie, i) => {
            if (s1[i] === 'yes' && s2[i] === 'yes') {
                state.isMatched = true;
                showMatchScreen(movie, i);
            }
        });
    }

    async function showMatchScreen(title, index) {
        document.getElementById('m-name-fin').innerText = title;
        const result = await getPoster(title, index);
        const url = result.url || result;
        document.getElementById('m-post-fin').innerHTML = url === "🎬" ? "🎬" : `<img src="${url}">`;
        document.getElementById('match-popup').style.display = 'flex';
    }
</script>
</body>
</html>
