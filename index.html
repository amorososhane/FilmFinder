<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmFinder</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #6366f1; --bg: #0b0b0b; --card: #171717; --text: #f0e4cc; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100%; overflow: hidden; }
        .sm { height: 100vh; position: relative; display: flex; flex-direction: column; }
        .sc { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity .35s; visibility: hidden; }
        .sc.on { opacity: 1; pointer-events: all; visibility: visible; }
        .wordmark { font-family: 'Playfair Display', serif; font-size: 52px; line-height: 1; color: #fff; text-align: center; }
        .wordmark em { font-style: italic; color: var(--accent); }
        .tagline { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 30px; }
        .btn-g { background: var(--accent); color: #fff; border: none; padding: 14px 32px; font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; border-radius: 8px; width: 100%; max-width: 240px; }
        .btn-gh { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; max-width: 240px; margin-top: 10px; }
        .inp { background: #141414; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 6px; width: 100%; max-width: 240px; outline: none; margin-bottom: 10px; box-sizing: border-box; }
        .ta { background: #141414; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 6px; width: 100%; max-width: 240px; height: 120px; resize: none; box-sizing: border-box; }
        .carea { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        .mc { background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 40px 20px; border-radius: 20px; width: 280px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); z-index: 2; position: relative; }
        .ct { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 10px; }
        .swbtns { display: flex; gap: 24px; padding-bottom: 60px; }
        .swb { width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; }
        .swb:active { transform: scale(0.9); }
        .swyes { background: rgba(34, 197, 94, 0.15); color: #22c55e; border: 1px solid #22c55e; }
        .swno { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid #ef4444; }
        .mrow { padding: 15px; background: #171717; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 10px; text-align: center; font-size: 18px; font-family: 'Playfair Display', serif; }
        @keyframes swipeRight { to { transform: translateX(200%) rotate(30deg); opacity: 0; } }
        @keyframes swipeLeft { to { transform: translateX(-200%) rotate(-30deg); opacity: 0; } }
        .fR { animation: swipeRight 0.4s forwards; }
        .fL { animation: swipeLeft 0.4s forwards; }
    </style>
</head>
<body>

<div class="sm" id="smapp">
    <div id="intro-sc" class="sc on">
        <div class="wordmark">Film<em>Finder</em></div>
        <div class="tagline">sync your movie night</div>
        <button class="btn-g" onclick="show('setup-sc')">Create Room</button>
        <div style="margin: 15px 0; color: rgba(255,255,255,0.2); font-size: 10px; letter-spacing: 2px;">OR</div>
        <input type="text" id="joinID" class="inp" placeholder="Enter 4-digit Code">
        <button class="btn-gh" onclick="joinRoom()">Join Partner</button>
    </div>

    <div id="setup-sc" class="sc">
        <div class="tagline">Setup Movies</div>
        <input type="text" id="myName" class="inp" placeholder="Your Name">
        <textarea id="mtxt" class="ta" placeholder="List movies here...&#10;Inception&#10;The Bear&#10;Ratatouille"></textarea>
        <div style="height: 20px;"></div>
        <button class="btn-g" onclick="createRoom()">Start Room</button>
        <button class="btn-gh" onclick="show('intro-sc')">Back</button>
    </div>

    <div id="sw-sc" class="sc">
        <div id="roomCodeDisplay" style="position:absolute; top:30px; font-size:10px; letter-spacing: 2px; color:var(--accent)"></div>
        <div class="carea">
            <div class="mc" id="card">
                <div id="ctit" class="ct">Loading...</div>
            </div>
        </div>
        <div class="swbtns">
            <button class="swb swno" onclick="vote('no')">✕</button>
            <button class="swb swyes" onclick="vote('yes')">♥</button>
        </div>
    </div>

    <div id="wait-sc" class="sc" style="overflow-y: auto; justify-content: flex-start; padding-top: 60px;">
        <div id="wait-msg">
            <div class="wordmark" style="font-size: 32px;">Waiting...</div>
            <p id="share-info" style="color: gray; font-size: 14px; text-align: center; margin-bottom: 40px;"></p>
        </div>
        <div id="results-list" style="width: 100%; max-width: 300px;"></div>
    </div>
</div>

<script>
    // CREDENTIALS
    const SB_URL = "https://sndrnxxmdjryqfnjzwsf.supabase.co";
    const SB_KEY = "sb_publishable_9DLNcW9p2Nx3uniVWlnQ-w_9Zqz5a7O";
    const supabase = lib.supabase.createClient(SB_URL, SB_KEY);

    let state = { rid: null, user: null, movies: [], idx: 0, mySwipes: {} };

    function show(id) {
        document.querySelectorAll('.sc').forEach(s => s.classList.remove('on'));
        document.getElementById(id).classList.add('on');
    }

    async function createRoom() {
        const name = document.getElementById('myName').value || "User 1";
        const rawMv = document.getElementById('mtxt').value.split('\n').filter(Boolean);
        const rid = Math.random().toString(36).substring(2, 6).toUpperCase();
        
        const { error } = await supabase.from('rooms').insert([{
            id: rid, movies: rawMv, name_1: name, swipes_1: {}, swipes_2: {}
        }]);

        if (!error) {
            state = { rid, user: 1, movies: rawMv, idx: 0, mySwipes: {} };
            initSwiping();
        } else { alert("Make sure your Supabase table is named 'rooms'"); }
    }

    async function joinRoom() {
        const rid = document.getElementById('joinID').value.toUpperCase();
        const { data, error } = await supabase.from('rooms').select('*').eq('id', rid).single();

        if (data) {
            state = { rid, user: 2, movies: data.movies, idx: 0, mySwipes: {} };
            initSwiping();
        } else { alert("Room not found. Check the code!"); }
    }

    function initSwiping() {
        show('sw-sc');
        document.getElementById('roomCodeDisplay').innerText = "ROOM CODE: " + state.rid;
        renderCard();
        subscribe();
    }

    function renderCard() {
        const card = document.getElementById('card');
        card.classList.remove('fR', 'fL');
        if (state.idx < state.movies.length) {
            document.getElementById('ctit').innerText = state.movies[state.idx];
        } else {
            finish();
        }
    }

    async function vote(v) {
        const card = document.getElementById('card');
        card.classList.add(v === 'yes' ? 'fR' : 'fL');
        
        state.mySwipes[state.idx] = v;
        const col = state.user === 1 ? 'swipes_1' : 'swipes_2';
        
        await supabase.from('rooms').update({ [col]: state.mySwipes }).eq('id', state.rid);
        
        setTimeout(() => {
            state.idx++;
            renderCard();
        }, 350);
    }

    function finish() {
        show('wait-sc');
        document.getElementById('share-info').innerText = state.user === 1 ? 
            "Give this code to your partner: " + state.rid : "Waiting for partner to finish...";
        checkMatches();
    }

    function subscribe() {
        supabase.channel('room_sync')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${state.rid}` }, 
            payload => { checkMatches(payload.new); })
            .subscribe();
    }

    async function checkMatches(dataFromEvent) {
        let data = dataFromEvent;
        if (!data) {
            const res = await supabase.from('rooms').select('*').eq('id', state.rid).single();
            data = res.data;
        }
        
        const s1 = data.swipes_1 || {};
        const s2 = data.swipes_2 || {};
        
        if (Object.keys(s1).length === state.movies.length && Object.keys(s2).length === state.movies.length) {
            const matches = state.movies.filter((m, i) => s1[i] === 'yes' && s2[i] === 'yes');
            document.getElementById('wait-msg').innerHTML = `<div class="wordmark" style="font-size:32px; margin-bottom:20px;">Matches!</div>`;
            document.getElementById('results-list').innerHTML = matches.length > 0 ? 
                matches.map(m => `<div class="mrow">${m}</div>`).join('') : 
                `<p style="text-align:center; color:gray;">No matches found. Try more movies!</p>`;
        }
    }
</script>
</body>
</html>
