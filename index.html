<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmFinder</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #6366f1; --bg: #0b0b0b; --text: #f0e4cc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100%; width: 100%; overflow: hidden; }
        
        .sm { height: 100vh; width: 100vw; position: relative; }

        .sc { 
            position: absolute; inset: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 24px; opacity: 0; visibility: hidden;
            transition: opacity .3s ease;
        }
        .sc.on { opacity: 1; visibility: visible; pointer-events: auto; z-index: 10; }

        .wordmark { font-family: 'Playfair Display', serif; font-size: 52px; line-height: 1; color: #fff; text-align: center; margin-bottom: 8px; pointer-events: none; }
        .wordmark em { font-style: italic; color: var(--accent); }
        .tagline { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 40px; pointer-events: none; }

        .btn-g { 
            background: var(--accent); color: #fff; border: none; 
            padding: 18px 32px; font-size: 13px; font-weight: 600; 
            letter-spacing: .1em; text-transform: uppercase; 
            cursor: pointer; border-radius: 12px; width: 100%; max-width: 260px; 
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            display: block; position: relative; z-index: 50 !important;
        }
        .btn-gh { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: rgba(255,255,255,0.7); padding: 16px; border-radius: 12px; 
            cursor: pointer; width: 100%; max-width: 260px; margin-top: 12px;
            display: block; position: relative; z-index: 50 !important;
        }

        .inp { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 14px; border-radius: 10px; width: 100%; max-width: 260px; outline: none; margin-bottom: 12px; font-size: 16px; }
        .ta { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 14px; border-radius: 10px; width: 100%; max-width: 260px; height: 140px; resize: none; font-size: 16px; font-family: inherit; }

        .mc { background: #171717; border: 1px solid rgba(255,255,255,0.1); padding: 50px 24px; border-radius: 24px; width: 300px; text-align: center; }
        .ct { font-family: 'Playfair Display', serif; font-size: 32px; color: #fff; }
        .swbtns { display: flex; gap: 30px; margin-top: 40px; }
        .swb { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .swyes { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid #22c55e; }
        .swno { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
    </style>
</head>
<body>

<div class="sm">
    <div id="intro-sc" class="sc on">
        <div class="wordmark">Film<em>Finder</em></div>
        <div class="tagline">sync your movie night</div>
        <button class="btn-g" onclick="showScreen('setup-sc')">Create Room</button>
        <div style="margin: 20px 0; color: rgba(255,255,255,0.1); font-size: 10px; letter-spacing: 3px;">OR</div>
        <input type="text" id="joinID" class="inp" placeholder="Room Code">
        <button class="btn-gh" onclick="joinRoom()">Join Partner</button>
    </div>

    <div id="setup-sc" class="sc">
        <div class="wordmark" style="font-size: 24px; margin-bottom: 20px;">Room Setup</div>
        <input type="text" id="myName" class="inp" placeholder="Your Name">
        <textarea id="mtxt" class="ta" placeholder="Enter movie titles (one per line)..."></textarea>
        <button class="btn-g" style="margin-top: 20px;" onclick="createRoom()">Start Swiping</button>
        <button class="btn-gh" onclick="showScreen('intro-sc')">Cancel</button>
    </div>

    <div id="sw-sc" class="sc">
        <div id="roomDisp" style="position:absolute; top:40px; font-size:11px; color:var(--accent); letter-spacing: 2px;"></div>
        <div class="mc" id="card"><div id="ctit" class="ct">Loading...</div></div>
        <div class="swbtns">
            <button class="swb swno" onclick="vote('no')">✕</button>
            <button class="swb swyes" onclick="vote('yes')">♥</button>
        </div>
    </div>

    <div id="wait-sc" class="sc" style="overflow-y: auto; justify-content: flex-start; padding-top: 60px;">
        <div id="wait-msg" style="text-align: center;">
            <div class="wordmark" style="font-size: 32px;">Waiting...</div>
            <p id="share-info" style="color: gray; margin-bottom: 30px;"></p>
        </div>
        <div id="results-list" style="width: 100%; max-width: 300px;"></div>
    </div>
</div>

<script>
    // These match your Supabase project
    const SB_URL = "https://sndrnxxmdjryqfnjzwsf.supabase.co";
    const SB_KEY = "sb_publishable_9DLNcW9p2Nx3uniVWlnQ-w_9Zqz5a7O";
    
    let supabase;
    let state = { rid: null, user: null, movies: [], idx: 0, mySwipes: {} };

    // Initialize Supabase safely
    window.onload = () => {
        if (typeof supabasejs !== 'undefined') {
            supabase = supabasejs.createClient(SB_URL, SB_KEY);
        } else if (window.supabase) {
            // Some versions use window.supabase
            supabase = window.supabase.createClient(SB_URL, SB_KEY);
        }
    };

    function showScreen(id) {
        console.log("Navigating to: " + id); // Check your browser console!
        document.querySelectorAll('.sc').forEach(s => s.classList.remove('on'));
        const target = document.getElementById(id);
        if(target) target.classList.add('on');
    }

    async function createRoom() {
        const name = document.getElementById('myName').value || "Host";
        const mvList = document.getElementById('mtxt').value.split('\n').filter(t => t.trim() !== "");
        const rid = Math.random().toString(36).substring(2, 6).toUpperCase();
        
        if(mvList.length === 0) { alert("Add some movies first!"); return; }

        try {
            const { error } = await supabase.from('rooms').insert([{
                id: rid, movies: mvList, name_1: name, swipes_1: {}, swipes_2: {}
            }]);
            if (error) throw error;
            state = { rid, user: 1, movies: mvList, idx: 0, mySwipes: {} };
            startSession();
        } catch (e) {
            alert("Database Error: " + e.message);
        }
    }

    async function joinRoom() {
        const rid = document.getElementById('joinID').value.toUpperCase();
        if(!rid) return;
        try {
            const { data, error } = await supabase.from('rooms').select('*').eq('id', rid).single();
            if (error || !data) throw new Error("Room not found");
            state = { rid, user: 2, movies: data.movies, idx: 0, mySwipes: {} };
            startSession();
        } catch (e) {
            alert(e.message);
        }
    }

    function startSession() {
        showScreen('sw-sc');
        document.getElementById('roomDisp').innerText = "ROOM: " + state.rid;
        renderCard();
        
        // Listen for matches
        supabase.channel('sync')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${state.rid}` }, 
            p => checkMatches(p.new))
            .subscribe();
    }

    function renderCard() {
        if (state.idx < state.movies.length) {
            document.getElementById('ctit').innerText = state.movies[state.idx];
        } else {
            showScreen('wait-sc');
            document.getElementById('share-info').innerText = state.user === 1 ? 
                "Tell partner to join code: " + state.rid : "Waiting for results...";
            checkMatches();
        }
    }

    async function vote(v) {
        state.mySwipes[state.idx] = v;
        const col = state.user === 1 ? 'swipes_1' : 'swipes_2';
        await supabase.from('rooms').update({ [col]: state.mySwipes }).eq('id', state.rid);
        state.idx++;
        renderCard();
    }

    async function checkMatches(dbData) {
        let data = dbData;
        if (!data) {
            const res = await supabase.from('rooms').select('*').eq('id', state.rid).single();
            data = res.data;
        }
        const s1 = data.swipes_1 || {}, s2 = data.swipes_2 || {};
        if (Object.keys(s1).length === state.movies.length && Object.keys(s2).length === state.movies.length) {
            const matches = state.movies.filter((m, i) => s1[i] === 'yes' && s2[i] === 'yes');
            document.getElementById('wait-msg').innerHTML = `<div class="wordmark" style="font-size:32px">Matches!</div>`;
            document.getElementById('results-list').innerHTML = matches.length > 0 ? 
                matches.map(m => `<div style="background:#1a1a1a; padding:15px; border-radius:12px; margin-bottom:10px; text-align:center; font-family:'Playfair Display'; font-size:22px;">${m}</div>`).join('') :
                `<p>No matches. Sad!</p>`;
        }
    }
</script>
</body>
</html>
